<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — McMichael Pizza</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .input-field {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s;
        }
        .input-field:focus { border-color: #f97316; }
        .input-field::placeholder { color: #94a3b8; }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-gray-900 font-black text-xl hover:text-orange-600 transition-colors">
                <span>🍕</span> Mc's Pizza
            </a>
            <button
                id="cartBtn"
                onclick="openCart()"
                class="bg-gray-900 hover:bg-orange-600 text-white font-semibold px-4 py-2 rounded-full flex items-center gap-2 transition-all text-sm"
            >
                🛒 Cart
                <span id="cartCount" class="bg-orange-500 text-white text-xs px-2 py-0.5 rounded-full font-bold">0</span>
            </button>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 py-10 grid grid-cols-1 lg:grid-cols-5 gap-8">

        <div class="lg:col-span-3 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">

            <div class="flex border-b border-gray-100">
                <div id="tab1" class="flex-1 py-4 text-center text-sm font-bold text-orange-600 border-b-2 border-orange-500">
                    1 · Delivery Details
                </div>
                <div id="tab2" class="flex-1 py-4 text-center text-sm font-semibold text-gray-400 border-b-2 border-transparent">
                    2 · Confirm Order
                </div>
            </div>

            <div id="stepAddress" class="p-6 space-y-4">
                <h2 class="text-lg font-bold text-gray-900">Where should we deliver?</h2>

                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Full Name</label>
                    <input id="co-name" class="input-field" type="text" placeholder="e.g. Emeka Okonkwo" autocomplete="name">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Phone Number</label>
                    <input id="co-phone" class="input-field" type="tel" placeholder="e.g. 08012345678" autocomplete="tel">
                    <p class="text-xs text-gray-400 mt-1">Nigerian number — we'll call to confirm delivery</p>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Delivery Address</label>
                    <textarea id="co-address" class="input-field resize-none" rows="3"
                        placeholder="e.g. 12 Aminu Kano Crescent, Wuse 2, Abuja"></textarea>
                    <p class="text-xs text-gray-400 mt-1">Include a landmark if possible (e.g. "near GTBank")</p>
                </div>

                <button
                    id="nextStepBtn"
                    onclick="goToPayment()"
                    class="w-full bg-orange-600 hover:bg-orange-500 active:scale-95 text-white font-bold py-3.5 rounded-xl transition-all shadow-md shadow-orange-600/20 mt-2"
                >
                    Continue to Summary →
                </button>
            </div>

            <div id="stepConfirm" class="hidden p-6 space-y-4">
                <div class="flex items-center gap-2 mb-1">
                    <button onclick="backToAddress()" class="text-gray-400 hover:text-gray-700 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                    </button>
                    <h2 class="text-lg font-bold text-gray-900">Confirm your order</h2>
                </div>

                <div id="orderSummary" class="text-sm"></div>

                <button
                    id="confirmOrderBtn"
                    onclick="startCheckout()"
                    class="w-full bg-gray-900 hover:bg-black active:scale-95 text-white font-bold py-3.5 rounded-xl transition-all shadow-md mt-2 flex items-center justify-center gap-2"
                >
                    <span>Place Order</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </button>

                <p class="text-xs text-center text-gray-400">
                    Payment on delivery · Cash or Transfer accepted
                </p>
            </div>
        </div>

        <div class="lg:col-span-2">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sticky top-24">
                <h3 class="font-black text-gray-900 mb-4 flex items-center gap-2">
                    🛍️ Your Cart
                </h3>
                <div id="cartItems" class="space-y-1 max-h-72 overflow-y-auto pr-1"></div>
                <div class="border-t border-gray-100 mt-4 pt-4 flex justify-between items-center">
                    <span class="text-gray-500 font-medium text-sm">Total</span>
                    <span class="text-2xl font-black text-gray-900">₦<span id="cartTotal">0</span></span>
                </div>
                <a href="index.html" class="mt-3 block text-center text-xs text-orange-600 font-semibold hover:underline">
                    ← Add more items
                </a>
            </div>
        </div>

    </div>

    <script src="./js/cart.js"></script>
    <script src="./js/orders.js"></script>
    <script>

        const _origGoToPayment = window.goToPayment;
        window.goToPayment = function() {
            _origGoToPayment();
            const s = document.getElementById("stepConfirm");
            if (s && !s.classList.contains("hidden")) {
                document.getElementById("tab1").className =
                    "flex-1 py-4 text-center text-sm font-semibold text-gray-400 border-b-2 border-transparent";
                document.getElementById("tab2").className =
                    "flex-1 py-4 text-center text-sm font-bold text-orange-600 border-b-2 border-orange-500";
            }
        };
        const _origBack = window.backToAddress;
        window.backToAddress = function() {
            _origBack();
            document.getElementById("tab1").className =
                "flex-1 py-4 text-center text-sm font-bold text-orange-600 border-b-2 border-orange-500";
            document.getElementById("tab2").className =
                "flex-1 py-4 text-center text-sm font-semibold text-gray-400 border-b-2 border-transparent";
        };
    </script>
</body>
</html>
