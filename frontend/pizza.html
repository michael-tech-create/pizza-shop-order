<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Details — McMichael Pizza</title>
   <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .thumb { transition: all 0.15s; }
        .thumb:hover, .thumb.active { border-color: #ea580c; transform: scale(1.05); }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white/80 backdrop-blur-lg sticky top-0 z-40 border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-gray-900 font-black text-xl hover:text-orange-600 transition-colors">
                <span class="text-orange-500">🍕</span> Mc's Pizza
            </a>
            <button
                onclick="openCart()"
                class="bg-gray-900 hover:bg-orange-600 text-white font-semibold px-5 py-2.5 rounded-full shadow-lg flex items-center gap-2 transition-all active:scale-95"
            >
                🛒
                <span id="cartCount" class="bg-orange-500 text-white text-xs px-2 py-0.5 rounded-full font-bold">0</span>
            </button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 pt-6 pb-2">
        <a href="index.html" class="text-sm text-gray-400 hover:text-orange-600 font-medium transition-colors flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Back to menu
        </a>
    </div>

    <div id="skeletonEl" class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 animate-pulse">
            <div class="bg-gray-200 rounded-2xl h-80 lg:h-[480px]"></div>
            <div class="space-y-4 pt-4">
                <div class="h-8 bg-gray-200 rounded-xl w-2/3"></div>
                <div class="h-4 bg-gray-200 rounded-xl w-full"></div>
                <div class="h-4 bg-gray-200 rounded-xl w-4/5"></div>
                <div class="h-10 bg-gray-200 rounded-xl w-1/3 mt-4"></div>
                <div class="h-12 bg-gray-200 rounded-xl w-full mt-6"></div>
            </div>
        </div>
    </div>


    <main id="pizzaContent" class="hidden max-w-7xl mx-auto px-4 sm:px-6 py-6 pb-24">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">

            <div class="space-y-3">
                <div class="relative rounded-2xl overflow-hidden bg-gray-100 h-80 lg:h-[480px] shadow-lg">
                    <img
                        id="mainImage"
                        class="w-full h-full object-cover transition-all duration-300"
                        src=""
                        alt="Pizza"
                    >
                    <!-- Image counter badge -->
                    <div id="imgCounter" class="absolute bottom-3 right-3 bg-black/50 text-white text-xs font-bold px-3 py-1 rounded-full hidden">
                        1 / 1
                    </div>
                </div>

                <!-- Thumbnails -->
                <div id="thumbs" class="flex gap-2 overflow-x-auto pb-1"></div>
            </div>

            <div class="flex flex-col pt-2">


                <h1 id="pizzaName" class="text-3xl sm:text-4xl font-black text-gray-900 leading-tight mb-3"></h1>
                <p id="pizzaDesc" class="text-gray-500 text-base leading-relaxed mb-6"></p>

                <div class="flex items-baseline gap-2 mb-6">
                    <span class="text-4xl font-black text-orange-600" id="pizzaPrice"></span>
                </div>

                <div class="mb-10">
    <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 block">Choose Size</span>
    <div class="flex gap-3">
        <button onclick="selectSize('Small', this)" class="size-btn flex-1 py-2 border-2 border-gray-200 rounded-xl font-semibold text-sm text-gray-600 hover:border-orange-300 transition-colors">Small</button>
        <button onclick="selectSize('Medium', this)" class="size-btn flex-1 py-2 border-2 border-orange-500 bg-orange-50 rounded-xl font-bold text-orange-600 transition-colors">Medium</button>
        <button onclick="selectSize('Large', this)" class="size-btn flex-1 py-2 border-2 border-gray-200 rounded-xl font-semibold text-sm text-gray-600 hover:border-orange-300 transition-colors">Large</button>
    </div>
</div>

                

                <div class="flex items-center gap-3 mb-4">
                    <div class="flex items-center gap-2 bg-gray-100 p-1.5 rounded-xl border border-gray-200">
                        <button onclick="changeQty(-1)"
                            class="w-9 h-9 bg-white rounded-lg shadow-sm font-bold text-gray-600 hover:text-orange-600 hover:bg-orange-50 active:scale-90 transition-all flex items-center justify-center">—</button>
                        <span id="qtyDisplay" class="font-black text-gray-800 w-6 text-center">1</span>
                        <button onclick="changeQty(1)"
                            class="w-9 h-9 bg-white rounded-lg shadow-sm font-bold text-gray-600 hover:text-orange-600 hover:bg-orange-50 active:scale-90 transition-all flex items-center justify-center text-lg">+</button>
                    </div>

                    <button
                        id="addToCartBtn"
                        onclick="addPizzaToCart()"
                        class="flex-1 bg-gray-900 hover:bg-orange-600 active:scale-95 text-white font-bold py-3 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                        </svg>
                        Add to Cart
                    </button>
                </div>

                <a href="checkout.html"
                    class="w-full text-center bg-orange-600 hover:bg-orange-500 active:scale-95 text-white font-bold py-3 rounded-xl transition-all shadow-md shadow-orange-600/20 block">
                    Buy Now
                </a>

                <div class="mt-8 grid grid-cols-3 gap-3 text-center text-xs text-gray-500">
                    <div class="bg-gray-50 rounded-xl p-3">
                        <div class="text-xl mb-1">🔥</div>
                        <div class="font-semibold">Fresh Baked</div>
                    </div>
                    <div class="bg-gray-50 rounded-xl p-3">
                        <div class="text-xl mb-1">🛵</div>
                        <div class="font-semibold">Fast Delivery</div>
                    </div>
                    <div class="bg-gray-50 rounded-xl p-3">
                        <div class="text-xl mb-1">💳</div>
                        <div class="font-semibold">Pay on Arrival</div>
                    </div>
                </div>

            </div>
        </div>
    </main>

  
    <div id="errorEl" class="hidden max-w-7xl mx-auto px-4 py-20 text-center">
        <div class="text-5xl mb-4">🍕</div>
        <h2 class="text-2xl font-black text-gray-800 mb-2">Pizza not found</h2>
        <p class="text-gray-400 mb-6">This pizza might have been removed or the link is broken.</p>
        <a href="index.html" class="bg-orange-600 text-white font-bold px-6 py-3 rounded-xl hover:bg-orange-500 transition-colors">
            Back to Menu
        </a>
    </div>


    <div id="cartOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 hidden" onclick="closeCart()"></div>
    <div id="cart"
        class="fixed right-0 top-0 h-full w-full sm:w-[400px] bg-white shadow-2xl border-l border-gray-100 flex flex-col justify-between z-50 transition-transform duration-300 transform translate-x-full">
        <div class="p-6 flex-1 overflow-hidden flex flex-col">
            <div class="flex justify-between items-center pb-4 border-b border-gray-100 mb-6">
                <h2 class="text-2xl font-black text-gray-900 flex items-center gap-2">🛍️ Your Cart</h2>
                <button onclick="closeCart()" class="p-2 bg-gray-50 hover:bg-gray-100 text-gray-500 rounded-full transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div id="cartItems" class="space-y-4 overflow-y-auto flex-1 pr-2"></div>
        </div>
        <div class="p-6 border-t border-gray-100 bg-gray-50">
            <div class="flex justify-between items-end mb-6">
                <span class="text-gray-500 font-medium">Total</span>
                <span class="text-3xl font-black text-gray-900">₦<span id="cartTotal">0</span></span>
            </div>
            <a href="checkout.html"
                class="w-full bg-gray-900 hover:bg-black active:scale-[0.98] text-white font-bold py-4 rounded-xl shadow-lg transition-all text-center tracking-wide block text-center">
                Proceed to Checkout
            </a>
        </div>
    </div>

    <script src="./js/cart.js"></script>
    <script src="./js/orders.js"></script>
    <script src="./js/pizza.js"></script>
    <script>
        function openCart() {
            document.getElementById("cart").classList.remove("translate-x-full");
            document.getElementById("cartOverlay").classList.remove("hidden");
        }
        function closeCart() {
            document.getElementById("cart").classList.add("translate-x-full");
            document.getElementById("cartOverlay").classList.add("hidden");
        }
    </script>

</body>
</html>
