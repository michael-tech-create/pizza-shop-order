<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McMichael Pizza</title>
  
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css">
    
    <!-- Optional: Adding a modern font like Inter or Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white/70 backdrop-blur-lg sticky top-0 z-40 border-b border-gray-200 shadow-sm transition-all">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <h1 class="text-2xl sm:text-3xl font-black text-gray-900 tracking-tight flex items-center gap-2">
                <span class="text-orange-500">🍕</span> Mc's Pizza
            </h1>
            <button
                id="cartBtn"
                class="bg-gray-900 hover:bg-orange-600 text-white font-semibold px-5 py-2.5 rounded-full shadow-lg shadow-gray-900/20 flex items-center gap-2 transition-all active:scale-95"
            >
                <span>🛒</span> Cart 
                <span id="cartCount" class="bg-orange-500 text-white text-xs px-2 py-0.5 rounded-full font-bold">0</span>
            </button>
        </div>
    </nav>


    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6 sm:mt-10 mb-16">
        <div id="featuredPizza" class="relative w-full h-[450px] sm:h-[500px] lg:h-[600px] rounded-[2rem] overflow-hidden shadow-2xl shadow-orange-900/10 group">
    
            <img
                id="featuredImage"
                src="https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=2070&auto=format&fit=crop"
                class="absolute inset-0 w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105"
                alt="Featured Pizza"
            >

          
            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/50 to-transparent sm:bg-gradient-to-r sm:from-black/90 sm:via-black/60 sm:to-transparent"></div>

            <div class="absolute inset-0 flex flex-col justify-end sm:justify-center p-6 sm:p-12 lg:p-20 z-10">
                <div class="max-w-2xl">
                
                    <span class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-md border border-white/20 text-orange-400 px-4 py-2 rounded-full text-xs sm:text-sm font-bold mb-4 sm:mb-6 tracking-wider uppercase">
                        Mich Pie
                    </span>

                    <h1 id="featuredTitle" class="text-4xl sm:text-5xl lg:text-7xl font-black text-white mb-3 sm:mb-5 leading-tight">
                        Pepperoni <br class="hidden sm:block" />
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-yellow-400">Supreme</span>
                    </h1>

                    <p id="featuredDescription" class="text-gray-300 text-sm sm:text-lg lg:text-xl mb-6 sm:mb-8 max-w-lg leading-relaxed">
                        Loaded with double mozzarella, crispy artisanal pepperoni, and our secret family tomato sauce.
                    </p>

                    <div class="flex flex-wrap items-center gap-4 sm:gap-8">
                        <button id="featuredButton" class="bg-gradient-to-r from-orange-600 to-orange-500 hover:from-orange-500 hover:to-orange-400 text-white px-8 py-3.5 sm:py-4 rounded-full font-bold text-base sm:text-lg shadow-lg shadow-orange-600/30 transition-all hover:-translate-y-1 active:scale-95">
                            Order Now
                        </button>
                        
                        <div class="flex flex-col">
                            <span class="text-xs text-gray-400 font-medium uppercase tracking-wider">Price</span>
                            <span id="featuredPrice" class="text-3xl sm:text-4xl font-black text-white">
                                ₦5,000
                            </span>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </section>


    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-24">
        
 
        <div class="max-w-2xl mx-auto mb-12 relative">
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                    <svg class="h-6 w-6 text-gray-400 group-focus-within:text-orange-500 transition-colors" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input 
                    type="text" 
                    id="search" 
                    placeholder="Search your favorite pizza..." 
                    class="block w-full pl-14 pr-6 py-4 border-2 border-gray-100 rounded-2xl bg-white focus:outline-none focus:ring-0 focus:border-orange-500 text-gray-900 placeholder-gray-400 text-lg transition-all shadow-sm hover:shadow-md"
                >
            </div>
       
            <div id="menu" class="absolute left-0 right-0 top-full mt-3 bg-white rounded-2xl shadow-2xl border border-gray-100 divide-y divide-gray-50 overflow-hidden z-30 [&:empty]:hidden"></div>
        </div>

        <section>
            <div id="pizzaContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 sm:gap-8">
            </div>
        </section>

    <section class="mb-10 mt-6">

    <div class="flex items-center justify-between mb-4 mt-6">
        <h2 class="text-2xl font-bold text-orange-600">
            Popular Pizzas
        </h2>
    </div>

    <div
        id="featuredCards"
        class="flex gap-6 overflow-x-auto pb-4 scrollbar-hide"
    >
    </div>

</section>
    </main>

    <div id="cartOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 hidden transition-opacity" onclick="closeCart()"></div>
    
    <div
        id="cart"
        class="fixed right-0 top-0 h-full w-full sm:w-[400px] bg-white shadow-2xl border-l border-gray-100 flex flex-col justify-between z-50 transition-transform duration-300 transform translate-x-full"
    >
        <div class="p-6 flex-1 overflow-hidden flex flex-col">
            <div class="flex justify-between items-center pb-4 border-b border-gray-100 mb-6">
                <h2 class="text-2xl font-black text-gray-900 flex items-center gap-2">
                    🛍️ Your Cart
                </h2>
                <button onclick="closeCart()" class="p-2 bg-gray-50 hover:bg-gray-100 text-gray-500 rounded-full transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
    
            <div id="cartItems" class="space-y-4 overflow-y-auto flex-1 pr-2 custom-scrollbar">
           
            </div>
        </div>

        <div class="p-6 border-t border-gray-100 bg-gray-50">
            <div class="flex justify-between items-end mb-6">
                <span class="text-gray-500 font-medium">Estimated Total</span>
                <span class="text-3xl font-black text-gray-900">
                    ₦<span id="cartTotal">0.00</span>
                </span>
            </div>
            <button
                id="checkoutBtn"
                onclick="checkout()"
                class="w-full bg-gray-900 hover:bg-black active:scale-[0.98] text-white font-bold py-4 rounded-xl shadow-lg transition-all text-center tracking-wide"
            >
                Proceed to Checkout
            </button>
        </div>
    </div>

    <!-- Script to demo the cart slide (replace with your app.js logic) -->
    <script>
        function openCart() {
            document.getElementById('cart').classList.remove('translate-x-full');
            document.getElementById('cartOverlay').classList.remove('hidden');
        }
        function closeCart() {
            document.getElementById('cart').classList.add('translate-x-full');
            document.getElementById('cartOverlay').classList.add('hidden');
        }
        document.getElementById('cartBtn').addEventListener('click', openCart);
    </script>

    <script src="./js/app.js"></script>
    <script src="./js/cart.js"></script>
    <script src="./js/menu.js"></script>

</body>
</html>
