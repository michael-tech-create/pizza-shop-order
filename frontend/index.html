<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McMichael Pizza</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">

    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="bg-amber-100">

 
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between">

            <h1 class="text-2xl font-bold">
                🍕 Mc's Pizza
            </h1>

            <button
                id="cartBtn"
                class="bg-orange-700 text-white px-4 py-2 rounded-full"
            >
                Cart (<span id="cartCount">0</span>)
            </button>

        </div>
    </nav>


    <section class="text-center py-12">

        <h2 class="text-5xl font-bold mb-4">
            Fresh Pizza Delivered Fast
        </h2>

        <p class="text-gray-600">
            Order your favorite pizza online.
        </p>

    </section>

    <section class="max-w-7xl mx-auto px-4">

        <div
            id="pizzaContainer"
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
        >

        </div>

    </section>

  
    <div
        id="cart"
        class="fixed right-0 top-0 h-full w-96 bg-white shadow-lg p-4 hidden"
    >

        <h2 class="text-2xl font-bold mb-4">
            Cart
        </h2>

        <div id="cartItems"></div>

        <div class="mt-6">
            <h3 class="font-bold">
                Total:
                $<span id="cartTotal">0</span>
            </h3>

            <button
                id="checkoutBtn"
                onclick="checkout()"
                class="mt-4 bg-green-500 text-white px-4 py-2 rounded"
                
            >
                Checkout
            </button>
        </div>

    </div>

    <script src="./js/app.js"></script>
    <script src="./js/cart.js"></script>
    <script src="./js/menu.js"></script>

</body>
</html>
