<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
   
        .table-container::-webkit-scrollbar { height: 8px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>

<body class="bg-amber-100 text-slate-800 min-h-screen">
    <div class="flex items-center gap-2 text-orange-800">
    <h1 class="mx-5 py-3 text-orange-800 text-2xl font-bold tracking-tight">Admin Dashboard</h1>
        </div>
    <div class="max-w-7xl mx-auto p-6 mt-6">
        
   
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
            
            <button
                id="refreshBtn"
                onclick="loadOrders()"
                class="bg-orange-700 hover:bg-orange-90 active:bg-orange-700 text-white px-5 py-2.5 rounded-lg font-medium transition-all shadow-sm shadow-orange-500/30 flex items-center gap-2 transform active:scale-95"
            >
                <svg id="refreshIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                <span id="refreshText">Refresh Orders</span>
            </button>

         
            <div class="bg-white px-5 py-3 rounded-xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="bg-teal-100 p-2 rounded-lg">
                    <svg class="w-6 h-6 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <div>
                    <p class="text-xs text-slate-500 font-semibold uppercase tracking-wider">Total Revenue</p>
                    <div class="text-2xl font-bold text-slate-800">$<span id="revenue">0.00</span></div>
                </div>
            </div>
        </div>


        <div class="bg-white shadow-lg shadow-teal-100/50 rounded-2xl border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto table-container">
                <table class="w-full whitespace-nowrap">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">
                            <th class="px-6 py-4 rounded-tl-2xl">Order ID</th>
                            <th class="px-6 py-4">Pizza Selection</th>
                            <th class="px-6 py-4 text-center">Qty</th>
                            <th class="px-6 py-4 text-right rounded-tr-2xl">Total Cost</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTable" class="divide-y divide-slate-100 text-sm">
                     
                        <tr>
                            <td colspan="4" class="px-6 py-12 text-center text-slate-400">
                                <svg class="animate-spin h-8 w-8 mx-auto mb-4 text-teal-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                Loading orders...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

<script>
const API_URL = "http://localhost:8080";

async function loadOrders() {
    const btn = document.getElementById("refreshBtn");
    const icon = document.getElementById("refreshIcon");
    const text = document.getElementById("refreshText");
    const tableBody = document.getElementById("ordersTable");
    

    btn.disabled = true;
    btn.classList.add("opacity-80", "cursor-not-allowed");
    icon.classList.add("animate-spin");
    text.textContent = "Refreshing...";

    let orders = [];

    try {
  
        const res = await fetch(`${API_URL}/api/orders`);
        if (!res.ok) throw new Error("Server not responding");
        orders = await res.json();
    } catch (error) {
        console.warn("API not found. Using beautiful mock data for preview purposes!");

        await new Promise(resolve => setTimeout(resolve, 800));
        
  
        orders = [
            { id: "ORD-1042", pizza_id: "Spicy Pepperoni", quantity: 2, total_cost: 32.50 },
            { id: "ORD-1043", pizza_id: "Classic Margherita", quantity: 1, total_cost: 14.00 },
            { id: "ORD-1044", pizza_id: "BBQ Chicken Supreme", quantity: 3, total_cost: 58.75 },
            { id: "ORD-1045", pizza_id: "Vegetarian Delight", quantity: 1, total_cost: 16.20 },
            { id: "ORD-1046", pizza_id: "Meat Lovers", quantity: 4, total_cost: 84.00 }
        ];
    }


    let html = "";
    let totalRevenue = 0;

    if (orders.length === 0) {
        html = `
            <tr>
                <td colspan="4" class="px-6 py-12 text-center text-slate-500 font-medium">
                    No orders found.
                </td>
            </tr>`;
    } else {
        orders.forEach(order => {
            totalRevenue += order.total_cost;

            html += `
                <tr class="hover:bg-slate-50/80 transition-colors group">
                    <td class="px-6 py-4 font-medium text-teal-700">#${order.id}</td>
                    <td class="px-6 py-4 text-slate-700 flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center text-orange-600 font-bold text-xs">
                            ${String(order.pizza_id).charAt(0).toUpperCase()}
                        </div>
                        ${order.pizza_id}
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="inline-flex items-center justify-center bg-slate-100 text-slate-700 px-2.5 py-0.5 rounded-full text-xs font-semibold">
                            ${order.quantity}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-right font-medium text-slate-800">
                        $${Number(order.total_cost).toFixed(2)}
                    </td>
                </tr>
            `;
        });
    }

    tableBody.innerHTML = html;

    document.getElementById("revenue").textContent = totalRevenue.toFixed(2);


    btn.disabled = false;
    btn.classList.remove("opacity-80", "cursor-not-allowed");
    icon.classList.remove("animate-spin");
    text.textContent = "Refresh Orders";
}


document.addEventListener("DOMContentLoaded", loadOrders);

</script>
</body>
</html>
