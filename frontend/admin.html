<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
   
        .table-container::-webkit-scrollbar { height: 8px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>

<body class="bg-amber-100 text-slate-800 min-h-screen">
    
    <!-- Top Navigation -->
    <header class="bg-white/80 backdrop-blur-md border-b border-amber-200 sticky top-0 z-20 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-orange-100 p-2 rounded-lg">
                    <svg class="w-6 h-6 text-orange-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>
                    </svg>
                </div>
                <h1 class="text-orange-800 text-xl md:text-2xl font-bold tracking-tight">Admin Dashboard</h1>
            </div>
            
            <button
                id="refreshBtn"
                onclick="loadOrders()"
                class="bg-orange-700 hover:bg-orange-800 active:bg-orange-900 text-white px-5 py-2.5 rounded-xl font-medium transition-all shadow-md shadow-orange-700/30 flex items-center gap-2 transform active:scale-95"
            >
                <svg id="refreshIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                <span id="refreshText" class="hidden sm:inline">Refresh</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 mt-2">
        
        <!-- Metrics Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-8">
            
            <!-- Revenue Card -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-amber-200 flex items-center gap-5 transform transition hover:-translate-y-1 hover:shadow-md">
                <div class="bg-teal-100 p-4 rounded-xl">
                    <svg class="w-8 h-8 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <div>
                    <p class="text-sm text-slate-500 font-semibold uppercase tracking-wider mb-1">Total Revenue</p>
                    <div class="text-3xl font-bold text-slate-800" id="revenue">0.00</div>
                </div>
            </div>

            <!-- Orders Count Card -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-amber-200 flex items-center gap-5 transform transition hover:-translate-y-1 hover:shadow-md">
                <div class="bg-orange-100 p-4 rounded-xl">
                    <svg class="w-8 h-8 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                    </svg>
                </div>
                <div>
                    <p class="text-sm text-slate-500 font-semibold uppercase tracking-wider mb-1">Total Orders</p>
                    <div class="text-3xl font-bold text-slate-800" id="orderCount">0</div>
                </div>
            </div>

        </div>

        <!-- Table Section -->
        <div class="bg-white shadow-lg shadow-amber-200/50 rounded-2xl border border-amber-200 overflow-hidden">
            <div class="px-6 py-5 border-b border-amber-100 flex justify-between items-center bg-white">
                <h2 class="text-lg font-bold text-slate-800">Recent Orders</h2>
            </div>
            <div class="overflow-x-auto table-container">
                <table class="w-full whitespace-nowrap">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">
                            <th class="px-6 py-4">Order ID</th>
                            <th class="px-6 py-4">Pizza Selection</th>
                            <th class="px-6 py-4 text-center">Qty</th>
                            <th class="px-6 py-4 text-right">Total Cost</th>
                            <th class="px-6 py-4 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTable" class="divide-y divide-slate-100 text-sm">
                        <!-- Loading State -->
                        <tr>
                            <td colspan="5" class="px-6 py-16 text-center text-slate-400">
                                <svg class="animate-spin h-8 w-8 mx-auto mb-4 text-teal-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                <span class="font-medium">Loading orders...</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

<script>
const API_URL = "http://localhost:8080";

async function loadOrders() {
    const btn = document.getElementById("refreshBtn");
    const icon = document.getElementById("refreshIcon");
    const text = document.getElementById("refreshText");
    const tableBody = document.getElementById("ordersTable");
    const revenueEl = document.getElementById("revenue");
    const orderCountEl = document.getElementById("orderCount");


    btn.disabled = true;
    icon.classList.add("animate-spin");
    text.textContent = "Refreshing...";

    tableBody.innerHTML = `
        <tr>
            <td colspan="5" class="px-6 py-16 text-center text-slate-400">
                <svg class="animate-spin h-8 w-8 mx-auto mb-4 text-teal-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span class="font-medium">Loading orders...</span>
            </td>
        </tr>
    `;

    try {
        const response = await fetch(`${API_URL}/api/orders`);

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const orders = await response.json();
        console.log(orders);

        let revenue = 0;

        if (orders.length === 0) {
            tableBody.innerHTML = `
                <tr>
                    <td colspan="5" class="text-center py-16 text-slate-500">
                        <div class="flex flex-col items-center justify-center">
                            <svg class="w-12 h-12 text-slate-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                            <span class="font-medium">No orders found</span>
                        </div>
                    </td>
                </tr>
            `;
        } else {
            tableBody.innerHTML = orders.map(order => {
                revenue += Number(order.TotalCost);
                
                const statusStr = order.status ? order.status.toLowerCase() : "pending";
                let badgeClass = "bg-yellow-100 text-yellow-800 border-yellow-200";
                
                if (statusStr === "completed" || statusStr === "delivered") {
                    badgeClass = "bg-teal-100 text-teal-800 border-teal-200";
                } else if (statusStr === "cancelled") {
                    badgeClass = "bg-red-100 text-red-800 border-red-200";
                }

                return `
                    <tr class="transition-colors hover:bg-amber-50/50">
                        <td class="px-6 py-4 font-semibold text-slate-700">
                            #${order.order_id}
                        </td>

                        <td class="px-6 py-4 text-slate-600">
                            ${order.pizza_name || `Pizza ${order.pizza_id}`}
                        </td>

                        <td class="px-6 py-4 text-center text-slate-600 font-medium">
                            ${order.quantity}
                        </td>

                        <td class="px-6 py-4 text-right font-medium text-slate-800">
                            ${new Intl.NumberFormat("en-NG", {
                                style: "currency",
                                currency: "NGN"
                            }).format(Number(order.TotalCost))}
                        </td>

                        <td class="px-6 py-4 text-center">
                            <span class="px-3 py-1.5 rounded-full text-xs font-bold uppercase tracking-wide border ${badgeClass}">
                                ${order.status || "Pending"}
                            </span>
                        </td>
                    </tr>
                `;
            }).join("");
        }

        revenueEl.textContent = new Intl.NumberFormat("en-NG", {
            style: "currency",
            currency: "NGN"
        }).format(revenue);

        orderCountEl.textContent = orders.length;

    } catch (error) {

        tableBody.innerHTML = `
            <tr>
                <td colspan="5" class="text-center py-16 text-red-500">
                    <div class="flex flex-col items-center justify-center">
                        <svg class="w-12 h-12 text-red-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span class="font-medium">Failed to load orders. Please make sure the server is running.</span>
                    </div>
                </td>
            </tr>
        `;
        console.error(error);

    } finally {
        btn.disabled = false;
        icon.classList.remove("animate-spin");
        text.textContent = "Refresh";
    }
}

document.addEventListener("DOMContentLoaded", loadOrders);

</script>
</body>
</html>
