<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — McMichael Pizza</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }

        .input-field {
            width: 100%;
            padding: .75rem .9rem;
            font-size: .9rem;
            border: 1.5px solid #e2e8f0;
            border-radius: .625rem;
            outline: none;
            transition: all .2s ease;
        }
        .input-field:focus {
            border-color: #f97316;
            box-shadow: 0 0 0 4px rgba(249,115,22,0.1);
        }
        .input-field.input-error {
            border-color: #dc2626;
            box-shadow: 0 0 0 4px rgba(220,38,38,0.08);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        .spinner {
            border: 2.5px solid rgba(255,255,255,0.35);
            border-top-color: #fff;
            border-radius: 50%;
            width: 16px; height: 16px;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body class="bg-no-repeat bg-cover bg-center h-full min-h-screen flex items-center justify-center p-4"
      style="background-image: linear-gradient(rgba(143, 113, 113, 0.4), rgba(0, 0, 0, 0.4)), url('https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=2000');">



        <div id="loginCard" class="backdrop-blur-sm bg-white rounded-2xl shadow-2xl shadow-black/100 p-7">
                <div class="w-full max-w-md">

        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-2xl mb-4 shadow-lg border border-white/20">
                <span class="text-4xl">🍕</span>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-700 tracking-tight">McMichael Admin</h1>
            <p class="text-slate-400 text-sm mt-1.5 font-medium">Sign in to manage restaurant orders</p>
        </div>

            <div id="errorBanner"
                 class="hidden mb-5 flex items-start gap-2.5 bg-red-50 border border-red-100 text-red-700 text-sm font-medium rounded-xl px-4 py-3">
                <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <span id="errorText">Invalid username or password</span>
            </div>

            <form id="loginForm" autocomplete="on" novalidate>
                <div class="mb-4">
                    <label for="username" class="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wider">
                        Username
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="input-field text-slate-400 "
                        placeholder="Enter admin username"
                        autocomplete="username"
                        required
                        aria-required="true"
                        autofocus
                    >
                    <p id="usernameError" class="hidden text-xs text-red-600 mt-1.5 font-medium" role="alert"></p>
                </div>

                <div class="mb-2">
                    <label for="password" class="block text-xs font-bold text-slate-600  mb-1.5 uppercase tracking-wider">
                        Password
                    </label>
                    <div class="relative">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="input-field text-slate-400  pr-11"
                            placeholder="••••••••"
                            autocomplete="current-password"
                            required
                            aria-required="true"
                        >
                        <button
                            type="button"
                            id="togglePassword"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-orange-600 transition-colors p-1"
                            tabindex="-1"
                            aria-label="Toggle password visibility"
                        >
                            <svg id="eyeOpen" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            <svg id="eyeClosed" class="hidden w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21"/>
                            </svg>
                        </button>
                    </div>
                    <p id="passwordError" class="hidden text-xs text-red-600 mt-1.5 font-medium" role="alert"></p>
                </div>

                <div class="flex items-center justify-between mt-4 mb-6">
                    <label class="flex items-center gap-2 cursor-pointer select-none group">
                        <input type="checkbox" id="rememberMe" class="w-3.5 h-3.5 accent-orange-600 rounded">
                        <span class="text-xs text-slate-400 font-medium group-hover:text-orange-600 transition-colors">Keep me signed in</span>
                    </label>
                </div>

                <button
                    type="submit"
                    id="submitBtn"
                    class="w-full bg-orange-600 hover:bg-orange-700 active:scale-[0.98] disabled:opacity-70 disabled:cursor-not-allowed text-white font-bold py-3 rounded-xl shadow-lg shadow-orange-600/30 transition-all flex items-center justify-center gap-2"
                >
                    <span id="submitText">Sign In</span>
                    <span id="submitSpinner" class="spinner hidden"></span>
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-white/70 mt-6 font-medium">
            Restaurant staff only · Contact the owner if you've lost access
        </p>
    </div>

    <script>
        const API_URL = "http://localhost:8080";
        const TOKEN_KEY    = "mcpizza_admin_token";
        const USERNAME_KEY = "mcpizza_admin_username";
        const EXPIRY_KEY   = "mcpizza_admin_expiry";

        const form          = document.getElementById("loginForm");
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const submitBtn     = document.getElementById("submitBtn");
        const submitText    = document.getElementById("submitText");
        const submitSpinner = document.getElementById("submitSpinner");
        const errorBanner   = document.getElementById("errorBanner");
        const errorText     = document.getElementById("errorText");
        const loginCard     = document.getElementById("loginCard");

        (function checkExistingSession() {
            const token  = localStorage.getItem(TOKEN_KEY);
            const expiry = Number(localStorage.getItem(EXPIRY_KEY) || 0);

            if (token && expiry && Date.now() / 1000 < expiry) {
                fetch(`${API_URL}/api/auth/verify`, {
                    headers: { "Authorization": `Bearer ${token}` },
                }).then(res => {
                    if (res.ok) window.location.href = "admin.html";
                }).catch(() => {});
            }
        })();

        document.getElementById("togglePassword").addEventListener("click", () => {
            const isPassword = passwordInput.type === "password";
            passwordInput.type = isPassword ? "text" : "password";
            document.getElementById("eyeOpen").classList.toggle("hidden", isPassword);
            document.getElementById("eyeClosed").classList.toggle("hidden", !isPassword);
        });

        function clearFieldErrors() {
            [usernameInput, passwordInput].forEach(el => {
                el.classList.remove("input-error");
                el.setAttribute("aria-invalid", "false");
            });
            document.getElementById("usernameError").classList.add("hidden");
            document.getElementById("passwordError").classList.add("hidden");
        }

        function showFieldError(inputEl, errorEl, message) {
            inputEl.classList.add("input-error");
            inputEl.setAttribute("aria-invalid", "true");
            errorEl.textContent = message;
            errorEl.classList.remove("hidden");
        }

        function showBannerError(message) {
            errorText.textContent = message;
            errorBanner.classList.remove("hidden");
            loginCard.classList.remove("shake");
            void loginCard.offsetWidth;
            loginCard.classList.add("shake");
        }

        function hideBannerError() {
            errorBanner.classList.add("hidden");
        }

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            submitText.textContent = isLoading ? "Signing in…" : "Sign In";
            submitSpinner.classList.toggle("hidden", !isLoading);
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            clearFieldErrors();
            hideBannerError();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            let hasError = false;
            if (!username) {
                showFieldError(usernameInput, document.getElementById("usernameError"), "Username is required");
                hasError = true;
            }
            if (!password) {
                showFieldError(passwordInput, document.getElementById("passwordError"), "Password is required");
                hasError = true;
            }
            if (hasError) return;

            setLoading(true);

            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password }),
                });

                const data = await res.json();

                if (!res.ok) {
                    showBannerError(data.error || "Invalid username or password");
                    passwordInput.value = "";
                    passwordInput.focus();
                    return;
                }

                localStorage.setItem(TOKEN_KEY, data.token);
                localStorage.setItem(USERNAME_KEY, data.username);
                localStorage.setItem(EXPIRY_KEY, data.expires_at);

                submitText.textContent = "Success ✓";
                submitBtn.classList.remove("bg-orange-600", "hover:bg-orange-700");
                submitBtn.classList.add("bg-green-600");

                setTimeout(() => { window.location.href = "admin.html"; }, 450);

            } catch (err) {
                showBannerError("Couldn't reach the server. Check your connection.");
            } finally {
                if (!localStorage.getItem(TOKEN_KEY)) setLoading(false);
            }
        });

        usernameInput.addEventListener("input", () => {
            usernameInput.classList.remove("input-error");
            document.getElementById("usernameError").classList.add("hidden");
        });
        passwordInput.addEventListener("input", () => {
            passwordInput.classList.remove("input-error");
            document.getElementById("passwordError").classList.add("hidden");
            hideBannerError();
        });
    </script>
</body>
</html>
