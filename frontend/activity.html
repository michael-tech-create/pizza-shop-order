<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Log — McMichael Admin</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body      { font-family: 'Inter', sans-serif; background: #0f1117; color: #e2e8f0; }
        .mono     { font-family: 'JetBrains Mono', monospace; }
        .log-row  { border-left: 3px solid transparent; transition: background 0.1s; }
        .log-row:hover { background: rgba(255,255,255,0.04); }

        .level-info    { border-left-color: #3b82f6; }
        .level-success { border-left-color: #22c55e; }
        .level-warning { border-left-color: #f59e0b; }
        .level-error   { border-left-color: #ef4444; }

        .badge-info    { background:#1e3a5f; color:#93c5fd; }
        .badge-success { background:#14532d; color:#86efac; }
        .badge-warning { background:#451a03; color:#fcd34d; }
        .badge-error   { background:#450a0a; color:#fca5a5; }

        .cat-badge { background: rgba(255,255,255,0.08); color:#94a3b8; font-size:0.68rem; }

        #logFeed::-webkit-scrollbar { width: 5px; }
        #logFeed::-webkit-scrollbar-track { background: transparent; }
        #logFeed::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .pulse { animation: pulse-dot 1.4s ease-in-out infinite; }

        mark { background: rgba(251,191,36,0.25); color: #fbbf24; border-radius: 2px; }
        .filter-btn { transition: all 0.15s; }
        .filter-btn.active { outline: 2px solid currentColor; outline-offset: 2px; }
    </style>
</head>

<body class="min-h-screen flex flex-col">

<header class="bg-[#161b27] border-b border-white/10 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-4 flex-wrap">
        <div class="flex items-center gap-3">
            <a href="admin.html" class="text-slate-400 hover:text-white transition-colors flex items-center gap-1.5 text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Admin
            </a>
            <span class="text-white/20">|</span>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-400 pulse"></span>
                <span class="text-white font-semibold text-sm">Activity Log</span>
            </div>
            <span id="entryCount" class="bg-white/10 text-slate-300 text-xs font-mono px-2.5 py-0.5 rounded-full">0 entries</span>
        </div>

        <div class="flex items-center gap-2 flex-wrap">
            <label class="flex items-center gap-1.5 cursor-pointer select-none text-xs text-slate-400 hover:text-white transition-colors">
                <input type="checkbox" id="autoScroll" checked class="w-3.5 h-3.5 accent-orange-500">
                Auto-scroll
            </label>
            <button onclick="exportLog()" class="flex items-center gap-1.5 bg-white/10 hover:bg-white/20 text-slate-300 hover:text-white text-xs font-medium px-3 py-1.5 rounded-lg transition-all">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                Export CSV
            </button>
            <button onclick="clearLog()" class="flex items-center gap-1.5 bg-red-950/60 hover:bg-red-900/60 text-red-400 hover:text-red-300 text-xs font-medium px-3 py-1.5 rounded-lg transition-all border border-red-900/40">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                Clear
            </button>
        </div>
    </div>
</header>

<div class="bg-[#1a2035] border-b border-white/8 sticky top-[53px] z-20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex flex-wrap items-center gap-3">
        <div class="flex items-center gap-1.5 flex-wrap">
            <span class="text-xs text-slate-500 font-medium mr-1">Level:</span>
            <button data-level="" onclick="setLevel('')" class="filter-btn active text-xs font-semibold px-3 py-1 rounded-full bg-white/10 text-slate-300 hover:text-white">All</button>
            <button data-level="info" onclick="setLevel('info')" class="filter-btn text-xs font-semibold px-3 py-1 rounded-full badge-info text-blue-300 hover:opacity-90">Info</button>
            <button data-level="success" onclick="setLevel('success')" class="filter-btn text-xs font-semibold px-3 py-1 rounded-full badge-success text-green-300 hover:opacity-90">Success</button>
            <button data-level="warning" onclick="setLevel('warning')" class="filter-btn text-xs font-semibold px-3 py-1 rounded-full badge-warning text-yellow-300 hover:opacity-90">Warning</button>
            <button data-level="error" onclick="setLevel('error')" class="filter-btn text-xs font-semibold px-3 py-1 rounded-full badge-error text-red-300 hover:opacity-90">Error</button>
        </div>

        <div class="flex items-center gap-1.5">
            <span class="text-xs text-slate-500 font-medium">Category:</span>
            <select id="catFilter" onchange="renderLog()" class="bg-white/10 border border-white/10 text-slate-300 text-xs rounded-lg px-2.5 py-1 focus:outline-none focus:ring-1 focus:ring-orange-500 cursor-pointer">
                <option value="">All</option>
                <option value="Order">Order</option>
                <option value="Pizza">Pizza</option>
                <option value="Image">Image</option>
                <option value="Cart">Cart</option>
                <option value="System">System</option>
                <option value="UI">UI</option>
            </select>
        </div>

        <div class="flex items-center gap-1.5">
            <span class="text-xs text-slate-500 font-medium">Date:</span>
            <input type="date" id="dateFilter" onchange="renderLog()" class="bg-white/10 border border-white/10 text-slate-300 text-xs rounded-lg px-2.5 py-1 focus:outline-none focus:ring-1 focus:ring-orange-500 cursor-pointer">
        </div>

        <div class="ml-auto relative flex-1 max-w-xs">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" id="searchInput" placeholder="Search logs…" oninput="renderLog()" class="w-full bg-white/10 border border-white/10 text-slate-300 placeholder-slate-600 text-xs rounded-lg pl-8 pr-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-orange-500">
        </div>
    </div>
</div>

<div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 w-full">
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <div class="bg-[#1a2035] rounded-xl border border-white/8 px-4 py-3">
            <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">Total Events</p>
            <p class="text-2xl font-bold text-white mono mt-0.5" id="cntAll">0</p>
        </div>
        <div class="bg-[#1a2035] rounded-xl border border-white/8 px-4 py-3">
            <p class="text-xs text-green-500 font-medium uppercase tracking-wider">Success</p>
            <p class="text-2xl font-bold text-green-400 mono mt-0.5" id="cntSuccess">0</p>
        </div>
        <div class="bg-[#1a2035] rounded-xl border border-white/8 px-4 py-3">
            <p class="text-xs text-yellow-500 font-medium uppercase tracking-wider">Warning</p>
            <p class="text-2xl font-bold text-yellow-400 mono mt-0.5" id="cntWarning">0</p>
        </div>
        <div class="bg-[#1a2035] rounded-xl border border-white/8 px-4 py-3">
            <p class="text-xs text-red-500 font-medium uppercase tracking-wider">Error</p>
            <p class="text-2xl font-bold text-red-400 mono mt-0.5" id="cntError">0</p>
        </div>
    </div>
</div>

<div class="max-w-7xl mx-auto px-4 sm:px-6 pb-10 w-full flex-1">
    <div id="logFeed" class="bg-[#161b27] rounded-2xl border border-white/8 overflow-y-auto" style="max-height: calc(100vh - 280px); min-height: 300px;">
        <div class="sticky top-0 bg-[#1a2035] border-b border-white/8 grid grid-cols-[120px_72px_130px_1fr_80px] gap-0 px-4 py-2 z-10">
            <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Time</span>
            <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Level</span>
            <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Category</span>
            <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Message</span>
            <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">ms</span>
        </div>
        <div id="logRows"></div>
        <div id="emptyState" class="hidden py-20 text-center">
            <div class="text-5xl mb-3 opacity-30">📋</div>
            <p class="text-slate-500 font-medium">No log entries match your filters</p>
            <p class="text-slate-600 text-sm mt-1">Try changing the filters or perform some actions in the app</p>
        </div>
    </div>
    <div class="flex items-center justify-between mt-3 text-xs text-slate-600">
        <span id="visibleCount">Showing 0 entries</span>
        <button onclick="scrollToTop()" class="hover:text-slate-400 transition-colors flex items-center gap-1">↑ Scroll to top</button>
    </div>
</div>

<div id="detailDrawer" class="fixed right-0 top-0 h-full w-full sm:w-[420px] bg-[#1a2035] border-l border-white/10 z-50 transform translate-x-full transition-transform duration-200 flex flex-col shadow-2xl">
    <div class="flex items-center justify-between px-5 py-4 border-b border-white/10">
        <h3 class="font-semibold text-white text-sm">Entry Detail</h3>
        <button onclick="closeDetail()" class="text-slate-400 hover:text-white p-1 rounded-lg hover:bg-white/10 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
    </div>
    <div id="detailContent" class="p-5 overflow-y-auto flex-1 text-sm mono text-slate-300 space-y-3"></div>
</div>
<div id="detailOverlay" class="hidden fixed inset-0 bg-black/40 z-40 transition-opacity" onclick="closeDetail()"></div>

<script src="./js/logger.js"></script>
<script>
    let activeLevel = "";

    function escapeHTML(str) {
        if (!str) return "";
        return String(str).replace(/[&<>'"]/g, tag => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
        }[tag] || tag));
    }

    function fmtTime(iso) {
        const d = new Date(iso);
        return d.toLocaleTimeString("en-NG", { hour12: false }) + "." + String(d.getMilliseconds()).padStart(3, "0");
    }

    function formatLocalDate(iso) {
        // Fix for date timezone shifting issues
        const d = new Date(iso);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }

    function highlight(text, query) {
        const safeText = escapeHTML(text);
        if (!query) return safeText;
        const escaped = escapeHTML(query).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        return safeText.replace(new RegExp(`(${escaped})`, "gi"), "<mark>$1</mark>");
    }

    function setLevel(level) {
        activeLevel = level;
        document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.level === level));
        renderLog();
    }

    function renderLog() {
        const entries = window.AppLogger ? AppLogger.getAll() : [];
        const search = document.getElementById("searchInput").value.trim().toLowerCase();
        const catVal = document.getElementById("catFilter").value.toLowerCase();
        const dateVal = document.getElementById("dateFilter").value;

        document.getElementById("cntAll").textContent = entries.length;
        document.getElementById("cntSuccess").textContent = entries.filter(e => e.level === "success").length;
        document.getElementById("cntWarning").textContent = entries.filter(e => e.level === "warning").length;
        document.getElementById("cntError").textContent = entries.filter(e => e.level === "error").length;
        document.getElementById("entryCount").textContent = `${entries.length} entries`;

        const filtered = entries.filter(e => {
            if (activeLevel && e.level !== activeLevel) return false;
            if (catVal && !e.category.toLowerCase().includes(catVal)) return false;
            if (search && !e.message.toLowerCase().includes(search) && !e.category.toLowerCase().includes(search)) return false;
            if (dateVal && formatLocalDate(e.timestamp) !== dateVal) return false;
            return true;
        });

        document.getElementById("visibleCount").textContent = `Showing ${filtered.length} of ${entries.length} entries`;
        const rowsEl = document.getElementById("logRows");
        const emptyEl = document.getElementById("emptyState");

        if (filtered.length === 0) {
            rowsEl.innerHTML = "";
            emptyEl.classList.remove("hidden");
            return;
        }
        emptyEl.classList.add("hidden");

        rowsEl.innerHTML = filtered.map(e => {
            const dur = e.meta?.duration_ms != null ? `<span class="text-slate-600">${escapeHTML(e.meta.duration_ms)}</span>` : `<span class="text-slate-700">—</span>`;
            return `
                <div onclick="openDetail('${escapeHTML(e.id)}')" class="log-row level-${e.level} grid grid-cols-[120px_72px_130px_1fr_80px] gap-0 px-4 py-2.5 cursor-pointer border-b border-white/5 group">
                    <span class="mono text-slate-500 text-xs leading-5 truncate" title="${escapeHTML(e.timestamp)}">${fmtTime(e.timestamp)}</span>
                    <span class="self-start"><span class="badge-${e.level} text-xs font-semibold px-2 py-0.5 rounded-md mono">${e.level.toUpperCase().slice(0, 4)}</span></span>
                    <span class="cat-badge self-start text-xs px-2 py-0.5 rounded-md truncate max-w-[120px]">${escapeHTML(e.category)}</span>
                    <span class="text-slate-200 text-xs leading-5 pr-4">${highlight(e.message, search)}</span>
                    <span class="text-right mono text-xs leading-5">${dur}</span>
                </div>`;
        }).join("");

        if (document.getElementById("autoScroll").checked) document.getElementById("logFeed").scrollTop = 0;
    }

    function openDetail(id) {
        if (!window.AppLogger) return;
        const entry = AppLogger.getAll().find(e => e.id === id);
        if (!entry) return;

        document.getElementById("detailContent").innerHTML = `
            <div class="space-y-3">
                <div class="bg-white/5 rounded-xl p-4 space-y-2 text-xs">
                    <div class="flex justify-between"><span class="text-slate-500">ID</span><span class="text-slate-300">${escapeHTML(entry.id)}</span></div>
                    <div class="flex justify-between"><span class="text-slate-500">Timestamp</span><span class="text-slate-300">${new Date(entry.timestamp).toLocaleString("en-NG")}</span></div>
                    <div class="flex justify-between"><span class="text-slate-500">Level</span><span class="badge-${entry.level} px-2 py-0.5 rounded-md font-semibold">${escapeHTML(entry.level)}</span></div>
                    <div class="flex justify-between"><span class="text-slate-500">Category</span><span class="text-slate-300">${escapeHTML(entry.category)}</span></div>
                </div>
                <div class="bg-white/5 rounded-xl p-4">
                    <p class="text-xs text-slate-500 mb-2 font-semibold uppercase tracking-wider">Message</p>
                    <p class="text-slate-200 text-sm leading-relaxed">${escapeHTML(entry.message)}</p>
                </div>
                ${Object.keys(entry.meta || {}).length ? `
                <div class="bg-white/5 rounded-xl p-4">
                    <p class="text-xs text-slate-500 mb-2 font-semibold uppercase tracking-wider">Metadata</p>
                    <pre class="text-xs text-slate-300 whitespace-pre-wrap break-all">${escapeHTML(JSON.stringify(entry.meta, null, 2))}</pre>
                </div>` : ""}
            </div>`;

        document.getElementById("detailDrawer").classList.remove("translate-x-full");
        document.getElementById("detailOverlay").classList.remove("hidden");
    }

    function closeDetail() {
        document.getElementById("detailDrawer").classList.add("translate-x-full");
        document.getElementById("detailOverlay").classList.add("hidden");
    }

    function exportLog() { if(window.AppLogger) AppLogger.exportCSV(); }

    function clearLog() {
        if (!confirm("Clear all activity log entries? This cannot be undone.")) return;
        if(window.AppLogger) AppLogger.clear();
        renderLog();
    }

    function scrollToTop() { document.getElementById("logFeed").scrollTop = 0; }

    window.addEventListener("applog", () => renderLog());
    
  
    document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeDetail();
    });

    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("dateFilter").value = formatLocalDate(new Date());
        renderLog();
    });
</script>
</body>
</html>
